<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetTrack Pro · Private Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0f172a; color: #e2e8f0; padding: 20px; }
        .dashboard { max-width: 1600px; margin: 0 auto; display: grid; grid-template-columns: 280px 1fr 340px; gap: 20px; height: calc(100vh - 40px); }
        .left-panel, .middle-panel, .right-panel { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; padding: 24px; }
        /* Add all other styles from Parts 2, 3, 4 here */
        .contact-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; margin-bottom: 16px; }
        .step-pill { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 6px 14px; border-radius: 30px; font-size: 13px; color: #94a3b8; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; margin-right: 8px; }
        .step-pill.completed { background: #3b82f6; color: white; }
        .calendar-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 10px; }
        .calendar-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.03); border-radius: 8px; cursor: pointer; }
        .calendar-day.today { background: #3b82f6; color: white; }
    </style>
</head>
<body>
    <!-- Modals and main dashboard structure from Parts 2, 3, 4 -->
    <div class="dashboard">
        <!-- Left Panel -->
        <div class="left-panel">
            <!-- Logo, nav, market tickers, user profile -->
        </div>
        <!-- Middle Panel -->
        <div class="middle-panel">
            <div class="panel-header">
                <h2>Network Contacts</h2>
                <button class="add-btn" id="openAddContactModal">+ Add Contact</button>
            </div>
            <div id="contactsPanel"></div>
        </div>
        <!-- Right Panel -->
        <div class="right-panel">
            <div id="upcomingCallsList"></div>
            <div class="mini-calendar">
                <h4 id="calendarMonthYear">March 2026</h4>
                <div class="calendar-days" id="calendarDays"></div>
            </div>
        </div>
    </div>

    <script>
        // Consolidated JavaScript from Parts 5 and 6
        const currentSession = sessionStorage.getItem('currentSession');
        if (!currentSession) window.location.href = 'index.html';
        
        const session = JSON.parse(currentSession);
        // ... (rest of your working JavaScript)
        
        // Ensure render functions are called
        window.onload = function() {
            renderContacts();
            renderCalendar();
            renderUpcomingCalls();
            updateStats();
        };
    </script>
</body>
</html>
